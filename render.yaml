services:
  # 1. Backend API (Python) - Free Tier
  - type: web
    name: petpooja-backend
    env: python
    region: singapore
    plan: free # Explicitly set to free tier
    buildCommand: "./backend/setup.sh"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0

  # 2. Frontend App (Vercel)
  # For the frontend, deploying directly to Vercel (free tier) is better than using Render's free tier for Static Sites,
  # but here is the Render config if you want everything in Render Free Tier:
  - type: web
    name: petpooja-frontend
    env: static # Use Render's free Static Site tier for React apps instead of NodeJS
    region: singapore
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: "frontend/dist" # Where Vite outputs the HTML
    envVars:
      - key: VITE_API_BASE_URL
        value: "https://petpooja-backend.onrender.com"
